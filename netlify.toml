[build]
  command = "npm run build"
  publish = "dist"

# SPA — redirect all routes to index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term caching for Vite's hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
